name: Daily Vocabulary

on:
  schedule:
    - cron: '0 22 * * *'   # KST 오전 7시 (UTC 22:00 전날)
    - cron: '0 3 * * *'    # KST 오후 12시 (UTC 03:00)
    - cron: '0 10 * * *'   # KST 오후 7시  (UTC 10:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  send-vocabulary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install langchain-groq langchain-core langgraph requests

      - name: Run vocabulary sender
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vocabulary_sender.py

      - name: Commit sent_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/sent_log.json
          git diff --staged --quiet || git commit -m "[sent_log] $(date '+%Y-%m-%d') 세션 기록 자동 저장"
          git push
